<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase Alert | ระบบนำทางช่องจอดรถ KMUTT</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');
        
        /* --- Base Setup --- */
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Kanit', sans-serif; 
            overflow: auto; 
            height: 100vh; width: 100vw;
            background: #000;
            color: #fff;
        }

        .page { 
            position: absolute; /* เปลี่ยนจาก fixed เป็น absolute เพื่อการ scroll ที่ดีขึ้น */
            top: 0; left: 0; 
            width: 100%; 
            min-height: 100vh; /* ใช้ min-height แทน height เพื่อให้ยืดตามเนื้อหาได้ */
            display: none; 
            flex-direction: column; 
            align-items: center; 
            z-index: 1;
            overflow-y: auto; 
            background: #000; /* คุมโทนดำไว้ */
        }

        #page-pay {
            justify-content: flex-start; 
            padding-top: 50px;
            padding-bottom: 80px; /* สำคัญมาก! เพิ่มพื้นที่ให้เลื่อนพ้นปุ่มย้อนกลับ */
        }

        .active-page { display: flex !important; z-index: 100; }

        /* --- UI Elements --- */
        .btn-main { 
            display: inline-block;
            padding: 12px 40px;
            background: linear-gradient(45deg, #64090C, #9C0512);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(156, 5, 18, 0.4);
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(156, 5, 18, 0.4); }

        .invisible-start-btn {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 70px;
            height: 40vh;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 9999;
        }

        /* --- SECTION 1: YOUR LANDING PAGE --- */
        #page-landing { 
            background-color: #000;
            width: 100vw;
            min-height: 100vh;
            padding: 0 !important;
            margin: 0 !important;
            overflow-y: visible;
            position: relative; /* สำคัญมากเพื่อให้ปุ่มล่องหนอ้างอิงตำแหน่งได้ */
        }
        .project-title {
            font-family: 'Brush Script MT', cursive;
            font-size: 6em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(156, 5, 18, 0.4);
        }
        .clock-display {
            position: absolute;
            top: 20px;           /* ระยะห่างจากด้านบน */
            right: 30px;         /* ระยะห่างจากด้านขวา */
            left: auto;          /* ยกเลิกค่ากึ่งกลางเดิม */
            transform: none;     /* ยกเลิกค่ากึ่งกลางเดิม */
            background: transparent !important;
            margin: 0;
            padding: 0;
            z-index: 1000;       /* ให้อยู่เหนือ iframe ของ Figma */
            pointer-events: none;
            font-size: 2em;    /* ปรับขนาดตามความเหมาะสม */
            font-weight: bold;
            color: #F8D794;      /* สีทองตามธีมของคุณ */
        }

        /* --- SECTION 2: REGISTER (Adjusted to your theme) --- */
        #page-reg { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://cdn.phototourl.com/uploads/2026-03-17-0b41cc73-d0e8-4ecd-8246-7da263662950.png');
            background-size: cover; 
            justify-content: center;
        }
        .reg-container { 
            background: rgba(20, 20, 30, 0.95); 
            padding: 40px; 
            border-radius: 30px; 
            width: 85%; max-width: 350px; 
            border-top: 5px solid #9C0512;
            text-align: center;
        }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #333; border-radius: 12px; 
            background: #111; color: #fff; font-family: 'Kanit';
        }

        /* --- SECTION 3: DASHBOARD --- */
        #page-dash { background: #050505; padding-top: 20px; }
        .map-box { height: 200px; width: 90%; max-width: 450px; border-radius: 25px; margin-bottom: 20px; border: 2px solid #9C0512; }
        .dash-card { background: #111; border-radius: 20px; padding: 15px; flex: 1; border: 1px solid #222; text-align: center; }
        .badge { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 11px; }
        .bg-green { background: #2ecc71; color: #fff; }
        .bg-red { background: #e74c3c; color: #fff; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
    
    /* --- Global Styles (คงเดิมหรือปรับเล็กน้อย) --- */
    body, html {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Kanit, sans-serif; /* เพิ่ม Kanit เผื่อไว้ */
        background-color: #000;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
    }

    /* --- ส่วนของหน้าชำระเงิน (ปรับปรุงใหม่) --- */
    #page-pay {
        background-color: #000;
        justify-content: flex-start; /* ให้เนื้อหาเริ่มจากด้านบน */
        padding-top: 80px; /* เว้นที่ให้ Navbar */
    }

    .pay-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .pay-title {
        color: #F8D794; /* สี Cyan */
        font-size: 2em;
        font-weight: bold;
        margin: 0;
    }

    .pay-subtitle {
        color: #888;
        font-size: 1em;
        margin-top: 5px;
    }

    /* สไตล์ Card ข้อมูลแบบใหม่ (Inspired by Friend's design) */
    .info-card {
        background: rgba(20, 20, 30, 0.95); /* สีพื้นหลังเข้มๆ นุ่มๆ */
        width: 90%;
        max-width: 400px;
        padding: 20px;
        border-radius: 20px;
        margin-bottom: 15px;
        text-align: center;
        box-sizing: border-box;
        /* เพิ่มเส้นขอบด้านซ้ายสี Cyan ตามธีม */
        border-left: 5px solid #9C0512; 
        box-shadow: 0 5px 15px rgba(0,0,0,0.5); /* เพิ่มมิติ */
    }

    .card-label {
        font-size: 0.8em;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 5px;
    }

    .card-value {
        font-size: 1.8em;
        font-weight: bold;
        color: #fff;
        margin: 5px 0;
    }

    .card-status {
        font-size: 0.8em;
        color: #2ecc71; /* สีเขียวสำหรับสถานะ */
        margin-top: 5px;
    }

    /* ปรับปรุงปุ่มชำระเงินให้ดูดีขึ้น */
    .btn-pay-prompt {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 90%;
        max-width: 400px;
        padding: 15px;
        background: linear-gradient(135deg, #27ae60, #2ecc71); /* สีเขียวของ PromptPay */
        color: white;
        border: none;
        border-radius: 15px;
        font-size: 1.1em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        margin-bottom: 20px;
        box-shadow: 0 5px 10px rgba(46, 204, 113, 0.3);
    }

    .btn-pay-prompt:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 15px rgba(46, 204, 113, 0.5);
    }

    /* สไตล์ลิงก์ย้อนกลับ */
    .back-link {
        color: #888;
        text-decoration: none;
        font-size: 0.9em;
        margin-bottom: 20px;
        cursor: pointer;
    }

    .back-link:hover {
        color: #fff;
    }
    
    </style>
</head>
<body>

    <section id="page-landing" class="page active-page">
        <iframe
            src="https://embed.figma.com/proto/vDl1e6xYtSGACztlzQIjHM/Untitled?node-id=315-191&viewport=1616%2C-496%2C0.55&scaling=min-zoom&content-scaling=fixed&starting-point-node-id=1%3A2418&page-id=0%3A1&embed-host=share"
            style="width: 100%; height: 100vh; border: none;"
            allowfullscreen>
        </iframe>

        <button class="invisible-start-btn" onclick="goPage('reg')">⠀ ⠀ ⠀</button>
    
        <div class="clock-display" id="current-time">00:00:00</div>
    </section>

    <section id="page-reg" class="page">
        <div class="reg-container">
            <h2 style="color: #F8D794;">ลงทะเบียนเข้าใช้งาน</h2>
            <input type="text" id="fname" placeholder="ชื่อ">
            <input type="text" id="lname" placeholder="นามสกุล">
            <input type="email" id="email" placeholder="Email (KMUTT)">
            <button class="btn-main" style="width: 100%; margin-top: 15px;" onclick="validateAndGo()">เข้าสู่ระบบ</button>
        </div>
    </section>

    <section id="page-dash" class="page">
        <div id="userGreeting" style="color: #F8D794;">ยินดีต้อนรับ 👋</div>
        <h2 style="margin: 5px 0 20px 0;">ลานจอดรถ KMUTT</h2>
        <div id="map-dash" class="map-box"></div>
        
        <div style="display: flex; gap: 10px; width: 90%; max-width: 450px;">
            <div class="dash-card">
                <div style="font-size: 12px; color: #888;">สถานะช่องจอด</div>
                <div id="status-badges-container" style="display: flex; gap: 5px; justify-content: center; margin: 10px 0; flex-wrap: wrap;">
                    <div style="color: #555; font-size: 12px;">กำลังโหลด...</div>
                </div>
                <button class="btn-main" style="font-size: 0.9em; padding: 8px 20px;" onclick="startNavigation()">📍 นำทาง</button>
            </div>
            <div class="dash-card">
                <div style="font-size: 12px; color: #888;">เวลาจอด/ค่าบริการ</div>
                <div id="timer-dash" style="font-size: 20px; font-weight: bold; color: #F8D794; margin-top: 5px;">00:00:00</div>
                <div id="price-dash" style="color: #fff;">0 บาท</div>
            </div>
        </div>
        <button onclick="logout()" style="background: none; border: none; color: #555; margin-top: 20px; cursor: pointer;">ออกจากระบบ</button>
    </section>

    <section id="page-pay" class="page">
    
        <div class="pay-header">
            <p class="pay-title">ระบบชำระเงิน</p>
            <p class="pay-subtitle">ตึกแดง KMUTT - สรุปยอดค่าบริการ</p>
        </div>

        <div id="map-pay" class="map-box"></div>

        <div class="info-card">
            <div class="card-label">ช่องจอดของคุณ</div>
            <div id="display-spot" class="card-value" style="color: #9C0512;">--</div> <div class="card-status">● กำลังจอด (In Progress)</div>
        </div>

        <div class="info-card">
            <div class="card-label">เวลาจอดสะสม</div>
            <div id="timer-pay" class="card-value">--:--:--</div> 
        </div> <div class="info-card" style="border-top: 3px solid #9C0512; border-left: none;"> 
            <div class="card-label">ยอดชำระทั้งหมด</div>
            <div id="price-pay" class="card-value" style="font-size: 2.5em; color: #9C0512;">0 บาท</div> 
        </div>

        <button class="btn-pay-prompt" onclick="openQR()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c5/PromptPay_logo.png" alt="PromptPay" height="20"> ชำระเงินผ่าน PromptPay
        </button>

        <a onclick="goPage('dash')" class="back-link">ย้อนกลับ</a>

    </section>

    <div id="qrModal" class="modal">
        <div style="background: white; padding: 25px; border-radius: 25px; text-align: center; width: 280px;">
            <img src="https://cdn.phototourl.com/uploads/2026-03-17-f0f681e7-0f89-4e68-8a21-d10d59fba5bd.png" width="100%">
            <button class="btn-main" style="background: #333; margin-top: 15px;" onclick="closeQR()">เสร็จสิ้น</button>
        </div>
    </div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    let mapDash, mapPay;
    let parkedLat, parkedLng,parkedSpot;
    let userData = { fname: "", lname: "", email: "" };


    const BLYNK_AUTH_TOKEN = "hPGBkF64L7Oq8QaiUgloO5Lcnw5gTZrM"; 
    const BLYNK_BASE_URL = "https://blynk.cloud/external/api/"; 


    const SPOT_MAPPING = {
        "P05": "V0", "P06": "V1", "P07": "V2", "P08": "V3", "P09": "V4"
    };

    // นาฬิกาปกติ
    function updateClock() {
        const now = new Date();
        document.getElementById('current-time').textContent = now.toTimeString().split(' ')[0];
    }
    setInterval(updateClock, 1000);

    // =========================================================
    //                         หน้าชำระ
    // =========================================================
    //function calculateOvertimeFee(otMinutes) {
        //if (!otMinutes || otMinutes <= 0) return 0;
        //const ratePerMinute = 5; // ตั้งค่าปรับนาทีละ 5 บาท
        //return otMinutes * ratePerMinute;
    //}
    function calculateOvertimeFee(otMinutes) {
    // ถ้ามีนาทีที่เกินมา (otMinutes > 0) ให้ปรับ 10 บาททันที แบบเหมาจ่าย
        if (!otMinutes || otMinutes <= 0) return 0;
        return 10; 
    }

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
    
        if (urlParams.get('status') === 'pay') {
            const durationStr = urlParams.get('duration');
            parkedSpot = urlParams.get('spot'); // รับชื่อช่องจอด (เช่น P09)
            parkedLat = parseFloat(urlParams.get('lat'));
            parkedLng = parseFloat(urlParams.get('lng'));
            const exitType = urlParams.get('exit');
            const otMinutes = parseInt(urlParams.get('ot')) || 0;

            goPage('pay');

            if (exitType === 'auto') {
                setTimeout(() => {
                    alert(`🚗 ตรวจพบรถออกจากช่อง ${parkedSpot} เรียบร้อยแล้ว ระบบจะคำนวณค่าบริการตามจริงให้คุณ`);
                }, 500);
                
                const statusElem = document.querySelector('.card-status');
                if(statusElem) statusElem.innerHTML = "● ออกจากช่องจอดแล้ว (Completed)";
            }    

            // แสดงเลขช่องจอดใน UI
            if(parkedSpot) {
                const spotElem = document.getElementById('display-spot');
                if(spotElem) spotElem.innerText = parkedSpot;
            }

            // แสดงเวลาและคำนวณเงิน 
            if (durationStr && durationStr !== "null") {
                const timerElem = document.getElementById('timer-pay');
                const priceElem = document.getElementById('price-pay');
                if(timerElem) timerElem.innerText = durationStr;

                const parts = durationStr.split(':');
                
                //let totalHours = (+parts[0]) + (+parts[1] / 60) + (+parts[2] / 3600);
                let totalMinutesForCharge = (+parts[0] * 60) + (+parts[1]);
                //let price = 0;
                let normalPrice = totalMinutesForCharge * 0; //นาทีละ 0 บาท

                const overtimeFee = calculateOvertimeFee(otMinutes);
                const totalPrice = normalPrice + overtimeFee;
                if (overtimeFee > 0) {
                    priceElem.innerHTML = `
                        <span style="font-size: 0.5em; color: #ff4d4d;">(ค่าจอด ${normalPrice} + ค่าปรับ ${overtimeFee})</span><br>
                        ${totalPrice} บาท
                    `;
                    const statusElem = document.querySelector('.card-status');
                    if(statusElem) {
                        statusElem.style.color = "#ff4d4d";
                        statusElem.innerHTML = `● จอดเกินเวลามา ${otMinutes} นาที`;
                    }
                } else {
                    priceElem.innerText = totalPrice + " บาท";
                }
            }

                // --- Logic ใหม่: ต่ำกว่า 4 ชม. จอดฟรี ---
                //if (totalHours < 4) {
                //if (totalMinutes < 1) {
                    //price = 0;
                //} else {
                    //price = Math.ceil(totalMinutes) * 2;
                    //price = Math.ceil(totalHours) * 30; 
                //}

                //if(priceElem) priceElem.innerText = price + " บาท";
            
        }
    };

    function startNavigation() {
        window.location.href = 'map_page.html'; 
    }

    function goPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        const targetPage = document.getElementById('page-' + pageId);
        if(targetPage) targetPage.classList.add('active-page');
        
        if(pageId === 'dash') setTimeout(initMapDash, 300);
        if(pageId === 'pay') setTimeout(initMapPay, 300);
    }

    function initMapDash() {
        if (mapDash) return mapDash.invalidateSize();
        mapDash = L.map('map-dash', { zoomControl: false }).setView([13.6500, 100.4945], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapDash);
        L.marker([13.6500, 100.4945]).addTo(mapDash);
    }

    function initMapPay() {
        if (mapPay) return mapPay.invalidateSize();

        // 1. สร้างแผนที่ ซูมไปที่จุดที่รถจอด
        const startLat = parkedLat || 13.6515;
        const startLng = parkedLng || 100.4965;
    
        mapPay = L.map('map-pay', { zoomControl: false }).setView([startLat, startLng], 22);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
            maxZoom: 23,        // ซูมสูงสุดที่อนุญาตให้ User กด
            maxNativeZoom: 19   // ระดับความชัดสูงสุดของรูปแผนที่จริง (OSM)
        }).addTo(mapPay);

        // 2. โหลด GeoJSON (ต้องชื่อไฟล์เดียวกับใน map.js นะมึง)
        fetch('map_layout3.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJson(data, {
                    style: function(feature) {
                        if (feature.properties.type === 'parking_spot') {
                            const spotName = feature.properties.name;
                        
                            // --- ไฮไลท์สีแดงเฉพาะช่องที่มึงจอดจริง ---
                            if (spotName === parkedSpot) {
                                return { fillColor: '#ff0000', color: '#000', weight: 2, fillOpacity: 0.9 };
                            }
                            // ช่องอื่นๆ ให้เป็นสีขาวใสๆ
                            return { fillColor: '#ffffff', color: '#666', weight: 1, fillOpacity: 0.3 };
                        }
                        if (feature.properties.type === 'road') {
                            return { color: '#444', weight: 2 };
                        }
                        return {};
                    }
                }).addTo(mapPay);

                // 3. ปักหมุดย้ำอีกทีให้ชัดๆ
                L.marker([startLat, startLng]).addTo(mapPay)
                    .bindPopup(`<b>คุณจอดที่ช่อง ${parkedSpot}</b>`)
                    .openPopup();
            })
            .catch(err => console.error("Error loading GeoJSON in Pay page:", err));
    }

    async function validateAndGo() {
        const f = document.getElementById("fname").value;
        const l = document.getElementById("lname").value;
        const e = document.getElementById("email").value;

        if (!f || !l || !e) {
            return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
        }

        userData.fname = f;
        userData.lname = l;
        userData.email = e;

        document.getElementById("userGreeting").innerText = "ยินดีต้อนรับคุณ " + f + " 👋";
        goPage('dash');
       

    }

    function openQR() { document.getElementById('qrModal').style.display = 'flex'; }
    
    async function closeQR() {
        const finishBtn = document.querySelector("#qrModal .btn-main");
        finishBtn.innerText = "กำลังบันทึก...";
        finishBtn.disabled = true;

        await savePaymentToSheet();

        document.getElementById('qrModal').style.display = 'none';
        logout();
    }

    function logout() {
        window.location.href = 'index.html'; // ล้างค่าทั้งหมดโดยการโหลดหน้าใหม่
    }

    async function savePaymentToSheet() {
        const sendData = {
            fname: userData.fname,
            lname: userData.lname,
            email: userData.email,
            fee: document.getElementById('price-pay').innerText.replace(' บาท', '').trim()
        };

        const scriptURL = 'https://script.google.com/macros/s/AKfycbx7iUGNy1Kdh-TADwQi4wDJleKWqRAdx8PMzOqfYDh7HWX6uEKD7XC2KIZf8EAB6dCo/exec';

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(sendData)
            });
            console.log("Data saved successfully");
            return true;
        } catch (error) {
            console.error('Error saving to sheet:', error);
        }
    }


// =========================================================
//                     หน้า Dashboard
// =========================================================
function updateDashboardStatus() {
    // 1. สร้าง URL สำหรับดึงค่า Virtual Pins ทั้งหมดพร้อมกัน
    const vPins = Object.values(SPOT_MAPPING);
    const allPins = vPins.map(pin => `&${pin}`).join('');
    const fullUrl = `${BLYNK_BASE_URL}get?token=${BLYNK_AUTH_TOKEN}${allPins}`;

    // 2. ดึงข้อมูลจาก Blynk API
    fetch(fullUrl)
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('status-badges-container');
            if (!container) return;
            
            container.innerHTML = ''; // ล้างค่า "กำลังโหลด..." ออก

            // 3. วนลูปสร้างวงกลมสถานะสำหรับแต่ละช่อง (P05-P09)
            Object.keys(SPOT_MAPPING).forEach(spotName => {
                const vPin = SPOT_MAPPING[spotName];
                const status = parseInt(data[vPin]); // ค่าจาก Blynk: 0=มีรถ, 1=ว่าง

                
                const badge = document.createElement('div');
                badge.className = `badge ${status === 1 ? 'bg-green' : 'bg-red'}`; 
                badge.innerText = spotName;

                
                badge.style.cssText = `
                    width: 35px; height: 35px; 
                    border-radius: 50%; 
                    display: flex; align-items: center; 
                    justify-content: center; 
                    font-weight: 600; font-size: 11px;
                    transition: background 0.3s ease;
                `;

                container.appendChild(badge);
            });
        })
        .catch(error => {
            console.error("Blynk Error on Dashboard:", error);
            document.getElementById('status-badges-container').innerHTML = 
                '<div style="color: red; font-size: 10px;">การเชื่อมต่อผิดพลาด</div>';
        });
}

// สั่งให้ทำงานครั้งแรกทันทีที่โหลดหน้า
updateDashboardStatus();


setInterval(updateDashboardStatus, 30000);


</script>
</body>
</html>
