<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยินดีต้อนรับ | ระบบนำทางช่องจอดรถ</title>
    <style>
        /* --- Global Styles Landing Page  --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000; 
            color: #fff; 
            /* ใช้ min-height องค์ประกอบตรงกลางในแนวตั้ง */
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* (header, main, footer) */
            overflow-x: hidden;
        }

        a {
            color: #fff;
            text-decoration: none;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* --- Header / Navbar --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background-color: rgba(0, 0, 0, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
        }

        .navbar .logo img {
            height: 30px;
        }

        .main-menu ul {
            display: flex;
        }

        .main-menu li {
            margin-right: 30px;
            font-weight: bold;
        }
        
        .main-menu a:hover {
            color: #007bff;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background-color: #333;
            border-radius: 5px;
            padding: 5px 10px;
        }

        .search-bar input {
            background: none;
            border: none;
            color: #fff;
            padding: 5px;
            outline: none;
            width: 150px;
        }
        
        .search-bar .search-icon {
             background: none;
             border: none;
             color: #fff;
             cursor: pointer;
             font-size: 1.1em;
        }

        /* --- Hero Section --- */
         /* --- Hero Section --- */
        .hero-section {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 80px; 
            background-color: #000;
            position: relative;
            overflow: hidden;
            text-align: center; 

            /* --- เพิ่ม Style พื้นหลังรูปรถตรงนี้ --- */
            background-image: url('car_index.png'); /* ใส่รูปรถเป็นพื้นหลัง */
            background-size: 98%; /* ให้รูปครอบคลุมพื้นที่ทั้งหมด */
            background-position: 110% ; /* จัดตำแหน่งรูปให้อยู่ตรงกลางด้านล่าง */
            background-repeat: no-repeat; /* ไม่ให้รูปซ้ำ */
            /* filter: brightness(0.8); */ /* อาจจะใส่ filter ให้รูปพื้นหลังดูมืดลงเล็กน้อย */
            /* opacity: 0.7; */ /* หรือปรับความโปร่งใส */
            /* --- สิ้นสุด Style พื้นหลังรูปรถ --- */
        }

        .hero-content {
            z-index: 1;
            position: relative;
            display: flex;
            flex-direction: column; 
            align-items: center;
        }

        .project-title {
            font-family: 'Brush Script MT', cursive;
            font-size: 8em;
            color: #fff;
            margin-bottom: 50px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        

        .timer {
            position: relative; /* เปลี่ยนเป็น relative เพื่อให้อยู่ใน flow ของ hero-content */
            margin-top: 600px; /* ปรับขึ้นไปอยู่ใกล้ตำแหน่งล้อในรูปพื้นหลัง */
            margin-left: 450px; /* ขยับไปทางขวา */
            transform: none; /* ยกเลิก transform เดิม */
            font-size: 2em;
            font-weight: bold;
            color: #00ffff;
            /*background-color: rgba(0, 0, 0, 0.5);*/
            padding: 5px 10px;
            border-radius: 5px;
        }

        /* ปุ่ม "เริ่มใช้งาน" */
        .start-button {
            display: inline-block;
            padding: 5px 40px;
            margin-top: 290px;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
            letter-spacing: 1px;
        }

        .start-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.6);
        }

        /* --- Footer --- */
        .footer {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            text-align: center;
            padding: 15px 0;
            font-size: 0.9em;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
    </style>
    </head>
<body>
    <header class="navbar">
        </header>

    <main class="hero-section">
        <div class="hero-content">
            
            
            <div class="timer" id = "current-time">23:07</div> <a href="map_page.html" class="start-button">
                เริ่มใช้งาน
            </a>
        </div>
    </main>

    <footer class="footer">
        </footer>
            <footer class="footer">
        
    </footer>

    <script>
        function updateClock() {
            const now = new Date();
            
            // ดึงชั่วโมง นาที วินาที และจัดรูปแบบให้มีเลข 0 นำหน้า
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            // จัดรูปแบบเวลาเป็น HH:MM:SS
            const timeString = `${hours}:${minutes}:${seconds}`;

            // แสดงผลเวลาใน div ที่มี id="current-time"
            document.getElementById('current-time').textContent = timeString;
        }

        // เรียกฟังก์ชัน updateClock ทันทีที่โหลดหน้า
        updateClock(); 

        // เรียกฟังก์ชัน updateClock ทุกๆ 1 วินาที
        setInterval(updateClock, 1000); 
    </script>
</body>
</html>
